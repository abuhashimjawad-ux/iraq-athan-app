name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK locally (no EAS worker quota used)
        env:
          EXPO_TOKEN: ${{ secrets.ADHAN_FINAL_BUILD }}
        run: eas build --local -p android --profile preview --non-interactive --output ./iraqi-adhan.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iraqi-adhan-apk
          path: iraqi-adhan.apk
          retention-days: 30
